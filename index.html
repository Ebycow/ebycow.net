<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ebycow.net</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg-color: #ffffff;
      --text-color: #111111;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0f1115;
        --text-color: #f5f7fa;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Consolas", "Courier New", monospace;
    }

    pre {
      line-height: 1.15;
      white-space: pre;
      user-select: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <pre id="art" aria-label="ASCII random art"></pre>
  </main>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
