<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ebycow.net</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg-color: #ffffff;
      --text-color: #111111;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0f1115;
        --text-color: #f5f7fa;
      }
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: "Consolas", "Courier New", monospace;
    }

    pre {
      line-height: 1.15;
      white-space: pre;
      user-select: none;
    }

  </style>
</head>
<body>
  <main class="wrap">
    <pre id="art" aria-label="ASCII random art"></pre>
  </main>

  <script>
    (() => {
      const FLDBASE = 16;
      const FLDSIZE_Y = FLDBASE + 1; // 9
      const FLDSIZE_X = FLDBASE * 2 + 1; // 17
      const AUG = " .o+=*BOX@%&#/^SE";
      const TRACE_WINDOW = 60;

      const title = "[EBYCOW.NET]";
      const hash = "[nya256]";

      const startX = (Math.random() * FLDSIZE_X) | 0;
      const startY = (Math.random() * FLDSIZE_Y) | 0;

      const field = Array.from({ length: FLDSIZE_X }, () =>
        Array(FLDSIZE_Y).fill(-Infinity)
      );

      let x = startX;
      let y = startY;
      let input = 0;
      let remainingMoves = 0;
      let tick = 0;

      const maxNormalTrace = AUG.length - 3;
      const startMark = AUG.length - 2;
      const endMark = AUG.length - 1;

      const art = document.getElementById("art");

      const clamp = (n, min, max) => Math.min(max, Math.max(min, n));

      function nextMoveBits() {
        if (remainingMoves === 0) {
          input = (Math.random() * 256) | 0;
          remainingMoves = 4;
        }

        const bits = input & 0x3;
        input >>= 2;
        remainingMoves -= 1;
        return bits;
      }

      function step() {
        const bits = nextMoveBits();
        tick += 1;

        x += (bits & 0x1) ? 1 : -1;
        y += (bits & 0x2) ? 1 : -1;

        x = clamp(x, 0, FLDSIZE_X - 1);
        y = clamp(y, 0, FLDSIZE_Y - 1);

        field[x][y] = tick;
      }

      function traceLevel(lastVisitedTick) {
        const age = tick - lastVisitedTick;
        if (age < 0 || age > TRACE_WINDOW) {
          return 0;
        }

        const level = maxNormalTrace - Math.floor((age / TRACE_WINDOW) * maxNormalTrace);
        return clamp(level, 1, maxNormalTrace);
      }

      function buildBorder(label) {
        const left = Math.floor((FLDSIZE_X - label.length) / 2);
        const right = FLDSIZE_X - left - label.length;
        return `+${"-".repeat(left)}${label}${"-".repeat(right)}+`;
      }

      function render() {
        const view = field.map((col) => col.map(traceLevel));

        if (tick <= TRACE_WINDOW) {
          view[startX][startY] = startMark;
        }
        view[x][y] = endMark;

        let out = `${buildBorder(title)}\n`;

        for (let yy = 0; yy < FLDSIZE_Y; yy++) {
          out += "|";
          for (let xx = 0; xx < FLDSIZE_X; xx++) {
            const idx = Math.min(view[xx][yy], AUG.length - 1);
            if (idx === endMark) {
              out += `<a href="https://github.com/Ebycow" style="color:red;text-decoration:underline;cursor:pointer">E</a>`;
            } else {
              out += AUG[idx] === "&" ? "&amp;" : AUG[idx];
            }
          }
          out += "|\n";
        }

        out += buildBorder(hash);
        art.innerHTML = out;
      }

      let last = 0;
      const frameMs = 60;

      function animate(ts) {
        if (!last || ts - last >= frameMs) {
          step();
          render();
          last = ts;
        }
        requestAnimationFrame(animate);
      }

      render();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
